<!DOCTYPE html>
<html>

<head>
  <title>Sentiment Analyzer</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #151925;
      --accent: #5ad1a7;
      --accent-2: #7ea6ff;
      --text: #e9edf5;
      --muted: #9aa3b5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 340px;
      margin: 0;
      padding: 16px;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 20%, #1b2232, #0f1117 45%),
        radial-gradient(circle at 80% 0%, #1a1f2d, #0f1117 50%);
      color: var(--text);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 17px;
      letter-spacing: 0.2px;
      text-align: left;
    }

    .hint {
      margin: 0 0 12px;
      font-size: 12px;
      color: var(--muted);
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: #0b0d12;
      border: none;
      cursor: pointer;
      border-radius: 10px;
      font-weight: 700;
      letter-spacing: 0.2px;
      transition: transform 0.08s ease, box-shadow 0.08s ease, opacity 0.2s;
      box-shadow: 0 10px 25px rgba(90, 209, 167, 0.25);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .card {
      margin-top: 12px;
      padding: 12px;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.35);
    }

    .progress {
      margin: 12px 0 4px;
      background: #1e2330;
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      transition: width 0.2s ease;
    }

    .progress-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    #results {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 6px;
    }

    .stat {
      padding: 10px;
      border-radius: 10px;
      background: #1c2231;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .stat .label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat .value {
      font-size: 18px;
      font-weight: 700;
    }

    .stat.positive .value {
      color: #5ad1a7;
    }

    .stat.neutral .value {
      color: #e6d65f;
    }

    .stat.negative .value {
      color: #ff7b7b;
    }

    .summary {
      display: none;
      margin-top: 10px;
      padding: 12px;
      background: #161b27;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      line-height: 1.5;
      font-size: 13px;
      color: #dce2ef;
    }

    .summary strong {
      color: var(--text);
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
    }

    .loading {
      display: none;
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <h1>YouTube Sentiment Analyzer</h1>
  <p class="hint">Tip: scroll the comments first so YouTube loads more text.</p>

  <button id="analyzeBtn">Analyze Comments</button>

  <div class="card">
    <div class="progress-label" id="progressLabel">Idle</div>
    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div id="loading" class="loading">Preparing…</div>
    <div id="results"></div>
    <div class="muted" id="meta"></div>
  </div>

  <div id="summary" class="summary">
    <strong>Summary:</strong> <span id="summaryText"></span>
  </div>

  <script src="popup.js"></script>
</body>

</html>
