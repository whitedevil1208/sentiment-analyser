<!DOCTYPE html>
<html>

<head>
  <title>Sentiment Analyzer</title>
  <style>
    body {
      width: 300px;
      padding: 10px;
      font-family: sans-serif;
    }

    h1 {
      font-size: 16px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background-color: #0056b3;
    }

    #results {
      margin-top: 15px;
      font-size: 14px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .loading {
      text-align: center;
      color: #666;
      display: none;
    }
  </style>
</head>

<body>
  <h1>YouTube Sentiment Analyzer</h1>
  <p style="font-size: 12px; color: #666; margin-bottom: 10px;">
    Tip: Scroll down to load more comments before analyzing.
  </p>
  <button id="analyzeBtn">Analyze Comments</button>
  <div id="loading" class="loading">Analyzing...</div>
  <div id="results"></div>
  <div id="summary"
    style="margin-top: 10px; padding: 10px; background-color: #f0f0f0; border-radius: 5px; display: none;">
    <strong>Summary:</strong> <span id="summaryText"></span>
  </div>
  <script src="popup.js"></script>
</body>

</html>
